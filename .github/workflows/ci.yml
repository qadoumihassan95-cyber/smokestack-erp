name: PFS CI

# Production-grade CI for the PFS backend. Every push and PR runs the full gate.
# The pipeline FAILS FAST — any required job failing blocks the whole run, and
# (with Render "auto-deploy after checks pass" enabled) blocks deployment.
#
# Jobs:
#   lint-static      ruff (bug rules) + ruff format (advisory) + bandit (security)
#   deps-audit       pip-audit (fails on any NEW advisory; known ones tracked below)
#   unit-tests       full pytest suite on SQLite (fast) — includes alembic chain +
#                    rollback tests (up/down/up) already present in the suite
#   migration-pg     REAL Postgres 16: alembic upgrade head (== prod preDeploy),
#                    single-head assertion, tenant-isolation integration tests
#   build-artifact   install verify + import smoke + versioned source artifact
#
# All five are required by `ci-passed`, the single status check to gate on.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint-static:
    name: Lint / format / static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff==0.16.* bandit==1.7.*
      - name: Ruff lint (bug rules — blocking)
        run: ruff check .
      - name: Ruff format check (advisory until formatted-baseline PR)
        run: ruff format --check --diff . || echo "::warning::formatting drift — adopt ruff-format baseline"
        continue-on-error: true
      - name: Bandit security scan (medium+ — blocking)
        run: bandit -q -r app -ll -c pyproject.toml

  deps-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install pip-audit==2.*
      # Fails on any NEW advisory. Known advisories are tracked here with a
      # remediation plan (see docs/ENGINEERING_PIPELINE.md); this list must shrink.
      - name: pip-audit (fail on new vulnerabilities)
        run: >
          pip-audit -r requirements.txt --strict
          --ignore-vuln PYSEC-2024-232 --ignore-vuln PYSEC-2024-233 --ignore-vuln PYSEC-2025-185
          --ignore-vuln PYSEC-2026-161 --ignore-vuln PYSEC-2026-248
          --ignore-vuln PYSEC-2026-249 --ignore-vuln PYSEC-2026-1942
          --ignore-vuln PYSEC-2026-1941 --ignore-vuln PYSEC-2026-2281
          --ignore-vuln PYSEC-2026-2280 --ignore-vuln PYSEC-2026-1325

  unit-tests:
    name: Unit + regression tests (SQLite)
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-secret-long-enough-value
      TELEGRAM_BOT_TOKEN: ci-test-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run full backend suite
        run: pytest -q

  migration-pg:
    name: Migration + integration on real PostgreSQL 16
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pfs
          POSTGRES_PASSWORD: pfs
          POSTGRES_DB: pfs_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pfs" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://pfs:pfs@localhost:5432/pfs_ci
      JWT_SECRET: ci-secret-long-enough-value
      TELEGRAM_BOT_TOKEN: ci-test-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: alembic upgrade head (mirrors prod preDeploy)
        run: alembic upgrade head
      - name: Assert exactly one alembic head
        run: |
          heads=$(alembic heads | grep -c '(head)')
          echo "heads=$heads"; test "$heads" -eq 1
      - name: Tenant-isolation + raw-SQL scoping integration tests on Postgres
        run: pytest -q tests/test_tenant_isolation.py tests/test_raw_sql_scoping.py tests/test_fail_closed.py

  build-artifact:
    name: Build verification + artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install (build verification)
        run: pip install -r requirements.txt
      - name: Import smoke (app boots without DB side effects)
        env:
          JWT_SECRET: ci-secret-long-enough-value
          TELEGRAM_BOT_TOKEN: ci-test-token
          SEED_ON_START: "false"
        run: python -c "import app.main; print('import ok', app.main.app.title)"
      - name: Package source artifact
        run: |
          mkdir -p ../dist
          tar --exclude='*.db' --exclude='__pycache__' --exclude='.pytest_cache' \
              -czf ../dist/pfs-backend-${{ github.sha }}.tar.gz app migrations alembic.ini requirements.txt render.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: pfs-backend-${{ github.sha }}
          path: dist/pfs-backend-${{ github.sha }}.tar.gz
          retention-days: 14

  ci-passed:
    name: CI passed (gate)
    runs-on: ubuntu-latest
    needs: [lint-static, deps-audit, unit-tests, migration-pg, build-artifact]
    steps:
      - run: echo "All required checks passed — safe to deploy."
