name: Control Center CI

# Independent CI for the Control Plane unit. Path-filtered so it runs ONLY when the
# Control Center changes — a change to an ERP never triggers it, and vice-versa (ADR-023).
on:
  push:
    branches: [main]
    paths: ["control-center/**", ".github/workflows/control-center-ci.yml"]
  pull_request:
    branches: [main]
    paths: ["control-center/**", ".github/workflows/control-center-ci.yml"]

concurrency:
  group: cc-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: control-center

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install "ruff==0.16.*"
      - run: ruff check .

  test:
    name: Unit tests (SQLite)
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-cc-secret
      SEED_ON_START: "true"
      SEED_PASSWORD: ci-owner-pw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q

  migration-pg:
    name: Migration on real PostgreSQL 16
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cc
          POSTGRES_PASSWORD: cc
          POSTGRES_DB: cc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U cc" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://cc:cc@localhost:5432/cc
      JWT_SECRET: ci-cc-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - name: alembic upgrade head (mirrors prod preDeploy)
        run: alembic upgrade head
      - name: Assert exactly one alembic head
        run: |
          heads=$(alembic heads | grep -c '(head)')
          echo "heads=$heads"; test "$heads" -eq 1
      - name: Reversibility (up -> down -> up)
        run: |
          alembic downgrade base
          alembic upgrade head

  build-smoke:
    name: Build + import smoke
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-cc-secret
      SEED_ON_START: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt
      - run: python -c "import main; print('control-center import ok:', main.app.title)"

  cc-ci-passed:
    name: Control Center CI passed (gate)
    runs-on: ubuntu-latest
    needs: [lint, test, migration-pg, build-smoke]
    steps:
      - run: echo "Control Center CI green — unit independently validated."
        working-directory: ${{ github.workspace }}
