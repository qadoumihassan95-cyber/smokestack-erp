# PFS backend — tooling configuration (linting, static analysis, tests).
# Introduced with the CI/CD pipeline. Rules are curated to catch real defects and
# be GREEN on the current codebase, so CI enforces from day one without a large
# behavior-neutral reformat. Style/modernization rules can be tightened later via a
# dedicated formatting-baseline PR (dogfooded through this same pipeline).

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = ["migrations/versions", "*.db", "frontend", "telegram_worker/__pycache__"]

[tool.ruff.lint]
# High-signal, bug-catching rules only (green on current code):
#   F  pyflakes (undefined names, redefinitions, f-string bugs)
#   E9 syntax errors
#   B  bugbear (real bugs) — minus B008 (FastAPI Depends() default-arg idiom)
#   S  a security subset (see per-file ignores for tests)
#   PIE, PLE  likely-error rules
select = ["F", "E9", "B", "PIE794", "PIE800", "PLE"]
ignore = [
    "B008",   # function call in default arg — this IS the FastAPI Depends() idiom
    "B006",   # mutable default — reviewed; not present in hot paths
    "B905",   # zip() strict — not required on this Python floor's call sites
    "F401",   # unused import — many are intentional re-exports; tighten later
    "F841",   # unused local — mostly in tests/debug; tighten later
    "B007",   # unused loop var — stylistic
    "B023",   # loop-var binding — audited false positives in migrations helpers
    "B904",   # raise-from in except — exception-chaining style, not a defect; tighten later
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S", "B", "F401", "F811"]           # test scaffolding is exempt from security/bugbear
"app/bb_migrate.py" = ["S608"]                    # parameterized DDL by fixed table allowlist
"app/**" = ["S101"]                               # asserts allowed outside of security-critical paths

[tool.ruff.format]
quote-style = "double"
line-ending = "lf"

[tool.pytest.ini_options]
addopts = "-p no:cacheprovider"
testpaths = ["tests"]

[tool.bandit]
# Security static analysis; skip test scaffolding and parameterized-DDL migration helper.
exclude_dirs = ["tests", "migrations", "frontend"]
skips = ["B101", "B608"]   # B101 assert_used (dev asserts), B608 hardcoded-SQL (fixed allowlist DDL)
