# SmokeStack — ROOT render.yaml (replace the repo-root render.yaml with this).
# Keeps the existing frontend service EXACTLY as-is, and adds the backend API
# web service + a managed PostgreSQL database. Requires the backend/ folder to be
# committed to the repo first, or the API build will fail.

databases:
  - name: smokestack-db
    plan: basic-256mb            # Render's smallest paid Postgres; scale up later.
    postgresMajorVersion: "16"

services:
  # ---- existing frontend (unchanged) ----
  - type: web
    name: smokestack
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"

  # ---- new backend API ----
  - type: web
    name: smokestack-api
    runtime: python
    plan: starter
    region: oregon
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"           # pin a stable runtime; avoid Python 3.14 wheel gaps
      - key: DATABASE_URL
        fromDatabase:
          name: smokestack-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "720"
      - key: CORS_ORIGINS
        value: https://smokestack-erp.onrender.com
      - key: SEED_ON_START
        value: "true"           # set to "false" after the first successful boot
      - key: TELEGRAM_BOT_TOKEN
        sync: false             # SAME BotFather token as the worker — lets the bot exchange a tg_id for the user's JWT

  # ---- Telegram bot (dedicated Background Worker; long-polling, NOT in FastAPI) ----
  - type: worker
    name: smokestack-telegram
    runtime: python
    plan: starter
    region: oregon
    branch: main
    rootDir: backend/telegram_worker
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: TELEGRAM_BOT_TOKEN
        sync: false              # set this secret in the Render dashboard (BotFather token)
      - key: SMOKESTACK_API_BASE
        value: https://smokestack-api.onrender.com
