<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PFS Control Center</title>
<style>
  :root{
    --bg:#f4f6f8; --surface:#ffffff; --ink:#1b2733; --muted:#5b6b7b; --faint:#8a99a8;
    --line:#e3e8ee; --line2:#eef2f6; --brand:#2ca01c; --brand-d:#1f7a15; --brand-t:#e9f6e6;
    --blue:#2f6fed; --blue-t:#e8f0fe; --amber:#b7791f; --amber-t:#fdf3e2; --red:#c23b3b;
    --red-t:#fbe9e9; --gray-t:#eef1f4; --shadow:0 1px 2px rgba(16,32,48,.06),0 2px 8px rgba(16,32,48,.05);
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;font-size:14px;cursor:pointer}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .hidden{display:none!important}

  /* buttons */
  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:8px 14px;
    border-radius:8px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:.12s}
  .btn:hover{background:#f7f9fb;border-color:#d5dde5}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{background:var(--brand-d);border-color:var(--brand-d)}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
  .btn.ghost:hover{background:var(--gray-t);color:var(--ink)}
  .btn.danger{color:var(--red);border-color:#f0cccc;background:#fff}
  .btn.danger:hover{background:var(--red-t)}
  .btn.sm{padding:5px 10px;font-size:13px;border-radius:7px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* badges */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;
    font-size:12px;font-weight:600;background:var(--gray-t);color:var(--muted);white-space:nowrap}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
  .b-green{background:var(--brand-t);color:var(--brand-d)}
  .b-blue{background:var(--blue-t);color:var(--blue)}
  .b-amber{background:var(--amber-t);color:var(--amber)}
  .b-red{background:var(--red-t);color:var(--red)}
  .b-gray{background:var(--gray-t);color:var(--muted)}

  /* shell */
  #app{min-height:100%}
  .topbar{position:sticky;top:0;z-index:30;height:56px;background:var(--surface);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:14px;padding:0 18px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.2px}
  .brand .logo{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,var(--brand),#38b24a);
    color:#fff;display:grid;place-items:center;font-size:13px;font-weight:800}
  .crumbs{display:flex;align-items:center;gap:7px;color:var(--muted);font-weight:600;min-width:0;overflow:hidden}
  .crumbs a:hover{color:var(--ink)}
  .crumbs .sep{color:var(--faint)}
  .crumbs .cur{color:var(--ink)}
  .spacer{flex:1}
  .opmenu{position:relative}
  .menu{position:absolute;right:0;top:42px;background:var(--surface);border:1px solid var(--line);border-radius:10px;
    box-shadow:var(--shadow);min-width:210px;padding:6px;z-index:40}
  .menu button{display:flex;width:100%;text-align:left;border:none;background:none;padding:9px 10px;border-radius:7px;
    color:var(--ink);align-items:center;gap:9px}
  .menu button:hover{background:var(--gray-t)}
  .menu .hd{padding:7px 10px 4px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:700}

  .layout{display:flex;min-height:calc(100vh - 56px)}
  .rail{width:224px;flex:none;background:var(--surface);border-right:1px solid var(--line);padding:14px 12px;
    display:flex;flex-direction:column;gap:2px}
  .rail a{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:var(--muted);font-weight:600}
  .rail a:hover{background:var(--gray-t);color:var(--ink)}
  .rail a.active{background:var(--brand-t);color:var(--brand-d)}
  .rail a .ic{width:17px;text-align:center;opacity:.9}
  .rail a .ct{margin-left:auto;font-size:11px;background:var(--gray-t);color:var(--muted);border-radius:999px;padding:0 7px;font-weight:700}
  .rail a.active .ct{background:#d6efd0;color:var(--brand-d)}
  .content{flex:1;min-width:0;padding:22px 26px 60px}

  .page-h{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px;flex-wrap:wrap}
  .page-h h1{font-size:21px;margin:0;font-weight:800;letter-spacing:-.2px}
  .page-h p{margin:3px 0 0;color:var(--muted)}
  .page-h .actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}

  /* cards / grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .erpcard{padding:18px;display:flex;flex-direction:column;gap:14px;cursor:pointer;transition:.12s}
  .erpcard:hover{border-color:#cfe6c8;box-shadow:0 4px 16px rgba(20,60,20,.10);transform:translateY(-1px)}
  .erpcard .top{display:flex;align-items:center;gap:12px}
  .erpcard .icon{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,#eaf6e6,#dff0da);
    color:var(--brand-d);display:grid;place-items:center;font-weight:800;font-size:16px;flex:none}
  .erpcard h3{margin:0;font-size:16px;font-weight:800}
  .erpcard .desc{color:var(--muted);font-size:13px;min-height:18px}
  .statrow{display:flex;gap:18px;flex-wrap:wrap;border-top:1px solid var(--line2);margin-top:2px;padding-top:12px}
  .stat b{display:block;font-size:17px;font-weight:800}
  .stat span{font-size:11.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;font-weight:700}

  /* summary tiles */
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px;margin-bottom:20px}
  .tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 15px;box-shadow:var(--shadow)}
  .tile b{display:block;font-size:22px;font-weight:800;letter-spacing:-.3px}
  .tile span{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;font-weight:700}

  /* tables */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .search{position:relative;flex:1;min-width:200px;max-width:360px}
  .search input,.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);
    border-radius:8px;font-size:14px;background:var(--surface);color:var(--ink)}
  .search input{padding-left:32px}
  .search .mag{position:absolute;left:10px;top:9px;color:var(--faint)}
  select.filter{padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--surface);font-weight:600;color:var(--ink)}
  .tablewrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{text-align:left;padding:11px 14px;background:#fafbfc;border-bottom:1px solid var(--line);
    font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700;white-space:nowrap}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line2);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:#fafcfb}
  td .co{font-weight:700} td .ref{font-size:12px;color:var(--faint)}
  .rowact{display:flex;gap:6px;justify-content:flex-end}
  .pager{display:flex;align-items:center;gap:10px;justify-content:flex-end;padding:11px 14px;border-top:1px solid var(--line2);color:var(--muted)}

  /* states */
  .empty{padding:46px 20px;text-align:center;color:var(--muted)}
  .empty .ei{font-size:30px;margin-bottom:8px;opacity:.5}
  .empty h4{margin:0 0 4px;color:var(--ink);font-size:15px}
  .skel{background:linear-gradient(90deg,#eef2f6 25%,#e5eaf0 37%,#eef2f6 63%);background-size:400% 100%;
    animation:sh 1.3s infinite;border-radius:8px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
  .errbox{background:var(--red-t);border:1px solid #f0cccc;color:#8a2b2b;padding:14px 16px;border-radius:10px;font-weight:600}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(20,32,44,.44);display:grid;place-items:center;z-index:60;padding:18px}
  .modal{background:var(--surface);border-radius:14px;box-shadow:0 20px 60px rgba(10,20,30,.3);width:100%;max-width:520px;
    max-height:90vh;overflow:auto}
  .modal .mh{padding:18px 20px 6px} .modal .mh h3{margin:0;font-size:17px;font-weight:800}
  .modal .mb{padding:8px 20px 4px} .modal .mf{padding:14px 20px 18px;display:flex;gap:9px;justify-content:flex-end;border-top:1px solid var(--line2);margin-top:12px}
  .field{margin:12px 0} .field label{display:block;font-weight:700;font-size:12.5px;margin-bottom:5px;color:var(--muted)}
  .field .hint{font-weight:500;color:var(--faint);font-size:12px;margin-top:4px}
  .note{background:#f6f8fa;border:1px solid var(--line);border-radius:9px;padding:11px 13px;color:var(--muted);font-size:13px}
  .note.warn{background:var(--amber-t);border-color:#f0dcae;color:#7a5a12}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* toast */
  #toasts{position:fixed;right:18px;bottom:18px;z-index:80;display:flex;flex-direction:column;gap:9px}
  .toast{background:#12232f;color:#fff;padding:11px 15px;border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.22);
    font-weight:600;display:flex;gap:9px;align-items:center;animation:tin .18s ease}
  .toast.ok{background:#1f7a15} .toast.err{background:#b3302f}
  @keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* login */
  .login{min-height:100vh;display:grid;place-items:center;padding:20px;
    background:radial-gradient(1200px 500px at 50% -10%,#e9f6e6,transparent),var(--bg)}
  .login .box{width:100%;max-width:380px}
  .login .card{padding:26px}
  .login .brand{justify-content:center;font-size:19px;margin-bottom:4px}
  .login h2{margin:14px 0 2px;font-size:18px;text-align:center}
  .login p.sub{margin:0 0 16px;text-align:center;color:var(--muted)}

  .lifecycle{display:flex;gap:8px;flex-wrap:wrap}
  .lc{border:1px solid var(--line);border-radius:8px;padding:8px 12px;background:#fafbfc;font-weight:600;color:var(--muted)}
  .lc b{display:block;color:var(--ink);font-size:12px}

  @media(max-width:820px){
    .layout{flex-direction:column}
    .rail{width:auto;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);padding:8px}
    .rail a{white-space:nowrap} .rail a .ct{display:none}
    .content{padding:16px 14px 50px}
    .crumbs .hideM{display:none}
  }
</style>
</head>
<body>
<div id="app"><div class="login"><div class="box"><div class="card login"><div class="brand"><div class="logo">PFS</div></div><p class="sub">Loading…</p></div></div></div></div>
<div id="modalRoot"></div>
<div id="toasts"></div>

<script>
"use strict";
/* ---------------- state + api ---------------- */
const S = { token: localStorage.getItem("cc_token")||"", op:null, erpName:{} };
const el = document.getElementById("app");
const modalRoot = document.getElementById("modalRoot");

function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function fmtDate(s){ if(!s) return "—"; const d=new Date(s); if(isNaN(d)) return "—";
  return d.toLocaleString(undefined,{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}
function fmtDay(s){ if(!s) return "—"; const d=new Date(s); if(isNaN(d)) return "—";
  return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});}
function timeAgo(s){ if(!s) return "—"; const d=new Date(s); const m=Math.floor((Date.now()-d)/60000);
  if(m<1) return "just now"; if(m<60) return m+"m ago"; const h=Math.floor(m/60); if(h<24) return h+"h ago";
  const dy=Math.floor(h/24); return dy+"d ago";}

async function api(path, opts={}){
  const h = Object.assign({}, opts.headers||{});
  if(S.token) h["Authorization"]="Bearer "+S.token;
  if(opts.json!==undefined){ h["Content-Type"]="application/json"; opts.body=JSON.stringify(opts.json); }
  const r = await fetch(path,{method:opts.method||"GET",headers:h,body:opts.body});
  if(r.status===401){ logout(); throw new Error("Session expired — please sign in again."); }
  let data=null; try{ data=await r.json(); }catch(e){}
  if(!r.ok){ const m=(data&&(data.detail||data.message))||("HTTP "+r.status); throw new Error(typeof m==="string"?m:JSON.stringify(m)); }
  return data;
}
async function login(u,p){
  const body=new URLSearchParams({username:u,password:p});
  const r=await fetch("/auth/login",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body});
  if(!r.ok) throw new Error("Invalid credentials");
  const d=await r.json(); S.token=d.access_token; localStorage.setItem("cc_token",S.token);
}
function logout(){ S.token=""; S.op=null; localStorage.removeItem("cc_token"); location.hash="#/"; renderLogin(); }

/* ---------------- toast + confirm ---------------- */
function toast(msg,kind){ const t=document.createElement("div"); t.className="toast "+(kind||"");
  t.innerHTML=(kind==="ok"?"✓ ":kind==="err"?"✕ ":"")+esc(msg); document.getElementById("toasts").appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transition=".3s";setTimeout(()=>t.remove(),300);},3200); }
function closeModal(){ modalRoot.innerHTML=""; }
function modal(html){ modalRoot.innerHTML=`<div class="overlay" id="ov">${html}</div>`;
  document.getElementById("ov").addEventListener("mousedown",e=>{ if(e.target.id==="ov") closeModal(); }); }
function confirmDialog({title,body,ok="Confirm",danger=false}){ return new Promise(res=>{
  modal(`<div class="modal" style="max-width:440px"><div class="mh"><h3>${esc(title)}</h3></div>
    <div class="mb">${body}</div>
    <div class="mf"><button class="btn" id="cX">Cancel</button>
    <button class="btn ${danger?"danger":"primary"}" id="cO">${esc(ok)}</button></div></div>`);
  document.getElementById("cX").onclick=()=>{closeModal();res(false);};
  document.getElementById("cO").onclick=()=>{closeModal();res(true);}; });}

/* ---------------- badges ---------------- */
function healthBadge(h){ const m={ok:["b-green","Healthy"],degraded:["b-amber","Degraded"],
  unreachable:["b-red","Unreachable"],unknown:["b-gray","Unknown"]}; const x=m[h]||m.unknown;
  return `<span class="badge ${x[0]}"><span class="dot"></span>${x[1]}</span>`; }
function licBadge(s){ const m={active:"b-green",trial:"b-blue",suspended:"b-amber",expired:"b-gray",
  cancelled:"b-red",unlicensed:"b-gray"}; return `<span class="badge ${m[s]||"b-gray"}">${esc(s||"—")}</span>`; }
function custBadge(s){ const m={active:"b-green",suspended:"b-amber",inactive:"b-gray"};
  return `<span class="badge ${m[s]||"b-gray"}">${esc(s||"—")}</span>`; }
function sessBadge(s){ const m={active:"b-green",pending_erp_integration:"b-amber",expired:"b-gray",revoked:"b-red"};
  const lbl={pending_erp_integration:"Pending ERP Integration"}[s]||s; return `<span class="badge ${m[s]||"b-gray"}">${esc(lbl)}</span>`; }
function verBadge(r){ if(r.is_legacy_import) return `<span class="badge b-amber">Imported legacy</span>`;
  const m={published:"b-green",draft:"b-gray",deprecated:"b-red"}; return `<span class="badge ${m[r.status]||"b-gray"}">${esc(r.status)}</span>`; }

/* ---------------- workspace nav ---------------- */
const TABS=[["overview","Overview","▤"],["customers","Customers","👥"],["sessions","Support Sessions","🔑"],
  ["versions","Versions","◷"],["updates","Updates","⤴"],["licenses","Licenses","▦"],
  ["health","Health","♥"],["audit","Audit","≣"],["settings","Settings","⚙"]];

/* ---------------- router ---------------- */
function parseHash(){ const h=(location.hash||"#/").replace(/^#/,""); const p=h.split("/").filter(Boolean);
  if(p[0]==="erp"&&p[1]) return {view:"erp",id:decodeURIComponent(p[1]),tab:p[2]||"overview"};
  if(p[0]==="sessions") return {view:"sessions"};
  if(p[0]==="audit") return {view:"paudit"};
  if(p[0]==="settings") return {view:"psettings"};
  return {view:"home"}; }

async function route(){
  if(!S.token){ renderLogin(); return; }
  if(!S.op){ try{ const h=await api("/api/home"); S.op=h.operator; window.__home=h;
      h.products.forEach(p=>S.erpName[p.id]=p.name);}catch(e){ renderLogin(); return; } }
  const r=parseHash();
  if(r.view==="home") return renderHome();
  if(r.view==="sessions") return renderPlatformSessions();
  if(r.view==="paudit") return renderPlatformAudit();
  if(r.view==="psettings") return renderPlatformSettings();
  if(r.view==="erp") return renderErp(r.id,r.tab);
}
window.addEventListener("hashchange",route);

/* ---------------- login ---------------- */
function renderLogin(){
  el.innerHTML=`<div class="login"><div class="box"><div class="card login">
    <div class="brand"><div class="logo">PFS</div><span>Control Center</span></div>
    <h2>Sign in</h2><p class="sub">Platform Owner access</p>
    <div id="lerr"></div>
    <div class="field"><label>Operator ID</label><input id="u" value="OP-owner" autocomplete="username"/></div>
    <div class="field"><label>Password</label><input id="p" type="password" autocomplete="current-password" placeholder="••••••••"/></div>
    <button class="btn primary" id="go" style="width:100%;justify-content:center;margin-top:6px">Sign in</button>
    <p class="hint faint" style="text-align:center;margin-top:14px;font-size:12px">One login · Many ERP products · Many customers</p>
  </div></div></div>`;
  const go=async()=>{ const b=document.getElementById("go"); b.disabled=true; b.textContent="Signing in…";
    try{ await login(document.getElementById("u").value.trim(),document.getElementById("p").value);
      S.op=null; location.hash="#/"; await route(); }
    catch(e){ document.getElementById("lerr").innerHTML=`<div class="errbox" style="margin-bottom:10px">${esc(e.message)}</div>`;
      b.disabled=false; b.textContent="Sign in"; } };
  document.getElementById("go").onclick=go;
  document.getElementById("p").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
}

/* ---------------- shell ---------------- */
function opInitials(){ const n=(S.op&&S.op.name)||"OP"; return n.split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase(); }
function shell({crumbs,rail,body}){
  el.innerHTML=`
  <div class="topbar">
    <a class="brand" href="#/"><div class="logo">PFS</div><span class="hideM">Control Center</span></a>
    <div class="crumbs">${crumbs}</div>
    <div class="spacer"></div>
    <div class="opmenu"><button class="btn ghost" id="opBtn"><span class="badge b-green" style="width:24px;height:24px;padding:0;justify-content:center">${opInitials()}</span><span class="hideM">${esc((S.op&&S.op.name)||"Operator")}</span> ▾</button>
      <div class="menu hidden" id="opM">
        <div class="hd">${esc((S.op&&S.op.id)||"")} · ${esc((S.op&&S.op.role)||"")}</div>
        <button onclick="location.hash='#/sessions'">All support sessions</button>
        <button onclick="location.hash='#/audit'">Platform audit</button>
        <button onclick="location.hash='#/settings'">Platform settings</button>
        <button onclick="logout()" style="color:var(--red)">Sign out</button>
      </div></div>
  </div>
  <div class="layout">${rail?`<div class="rail">${rail}</div>`:""}<div class="content" id="main">${body}</div></div>`;
  const ob=document.getElementById("opBtn"),om=document.getElementById("opM");
  ob.onclick=(e)=>{e.stopPropagation();om.classList.toggle("hidden");};
  document.addEventListener("click",()=>om.classList.add("hidden"),{once:true});
}
function crumbHome(){ return `<a href="#/">PFS</a>`; }

/* ---------------- HOME: My ERP Products ---------------- */
async function renderHome(){
  shell({crumbs:`<span class="cur">My ERP Products</span>`, rail:"", body:skelCards()});
  let h; try{ h=window.__home||await api("/api/home"); }catch(e){ return errMain(e); }
  window.__home=h; S.op=h.operator; h.products.forEach(p=>S.erpName[p.id]=p.name);
  const m=document.getElementById("main");
  const cards=h.products.map(p=>{
    const init=(p.name||p.id).split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();
    return `<div class="card erpcard" onclick="location.hash='#/erp/${encodeURIComponent(p.id)}/overview'">
      <div class="top"><div class="icon">${esc(init)}</div>
        <div style="min-width:0"><h3>${esc(p.name)}</h3><div class="faint mono" style="font-size:12px">${esc(p.id)}</div></div>
        <div style="margin-left:auto">${healthBadge(p.erp_health)}</div></div>
      <div class="desc">${esc(p.description||"")}</div>
      <div class="statrow">
        <div class="stat"><b>${p.customers}</b><span>Customers</span></div>
        <div class="stat"><b>${p.active_licenses}</b><span>Licenses</span></div>

/* -------- Customers (the heart) -------- */
const PAGE=25;
function erpCustomers(id,ov,m){
  let rows=ov.customers.slice(); let q="",st="",page=1;
  const draw=()=>{
    let f=rows.filter(r=>(!q|| (r.name||"").toLowerCase().includes(q)||(r.external_ref||"").toLowerCase().includes(q))
      && (!st||r.status===st));
    const total=f.length, pages=Math.max(1,Math.ceil(total/PAGE)); if(page>pages)page=pages;
    const slice=f.slice((page-1)*PAGE,page*PAGE);
    const body=slice.map(r=>`<tr>
      <td><div class="co">${esc(r.name)}</div><div class="ref mono">ref: ${esc(r.external_ref||"—")}</div></td>
      <td>${licBadge(r.license_status)}<div class="faint" style="font-size:12px">${esc(r.license_plan||"—")}</div></td>
      <td>${esc(r.current_version||"—")}</td>
      <td>${healthBadge(r.health)}<div class="faint" style="font-size:11px">inherited</div></td>
      <td class="faint">${r.last_sync_state==="not_yet_integrated"?'<span class="badge b-gray">Not integrated</span>':esc(fmtDate(r.last_sync_at))}</td>
      <td>${custBadge(r.status)}</td>
      <td class="faint" style="font-size:12px">${r.deployment_type==="customer_production_shared"?"Shared prod":esc(r.deployment_type)}</td>
      <td class="rowact"><button class="btn primary sm" onclick='openErpModal(${JSON.stringify(id)},${JSON.stringify(r)})'>Open ERP</button></td>
    </tr>`).join("");
    document.getElementById("cbody").innerHTML= total? body :
      `<tr><td colspan="8">${emptyState("No customers match","Adjust search or filters.","","")}</td></tr>`;
    document.getElementById("pager").innerHTML= total>PAGE?
      `Showing ${(page-1)*PAGE+1}–${Math.min(page*PAGE,total)} of ${total}
       <button class="btn sm" ${page<=1?"disabled":""} onclick="__cp(${page-1})">Prev</button>
       <button class="btn sm" ${page>=pages?"disabled":""} onclick="__cp(${page+1})">Next</button>` :
      `<span class="faint">${total} customer${total===1?"":"s"}</span>`;
  };
  window.__cp=(p)=>{page=p;draw();};
  m.innerHTML=`<div class="page-h"><div><h1>Customers</h1><p>The heart of this ERP — every company running ${esc(S.erpName[id]||id)}.</p></div>
    <div class="actions"><button class="btn" onclick='newCustomerModal(${JSON.stringify(id)})'>+ Add customer</button></div></div>
    <div class="toolbar">
      <div class="search"><span class="mag">⌕</span><input id="csearch" placeholder="Search company or reference…"/></div>
      <select class="filter" id="cstatus"><option value="">All statuses</option><option>active</option><option>suspended</option><option>inactive</option></select>
    </div>
    <div class="tablewrap"><div class="scroll"><table>
      <thead><tr><th>Company</th><th>License</th><th>Version</th><th>Health</th><th>Last sync</th><th>Status</th><th>Deployment</th><th></th></tr></thead>
      <tbody id="cbody"></tbody></table></div><div class="pager" id="pager"></div></div>`;
  document.getElementById("csearch").addEventListener("input",e=>{q=e.target.value.trim().toLowerCase();page=1;draw();});
  document.getElementById("cstatus").addEventListener("change",e=>{st=e.target.value;page=1;draw();});
  draw();
}

    </div>
    <div class="note warn" style="margin-bottom:14px">Per-customer health and last-sync require an ERP→PFS heartbeat that is not implemented yet.
      Customer rows below inherit the shared runtime's health and are explicitly marked <b>not yet integrated</b> — no values are fabricated.</div>
    <div class="tablewrap"><div class="scroll"><table>
      <thead><tr><th>Customer</th><th>Health</th><th>Source</th><th>Last sync</th></tr></thead>
      <tbody>${ov.customers.length?custRows:`<tr><td colspan="4">${emptyState("No customers","","","")}</td></tr>`}</tbody></table></div></div>`;
  const btn=document.getElementById("hchk");
  if(btn) btn.onclick=async()=>{ btn.disabled=true; btn.textContent="Checking…";
    try{ const r=await api("/api/runtimes/"+cp.id+"/health-check",{method:"POST"}); toast("Health: "+r.health,r.health==="ok"?"ok":"err");
      window.__ov=await api("/api/products/"+encodeURIComponent(id)+"/overview"); renderErp(id,"health");
    }catch(e){ toast(e.message,"err"); btn.disabled=false; btn.textContent="Run health check"; } };
}

/* -------- Audit -------- */
function erpAudit(id,ov,m){
  const body=ov.audit.map(a=>`<tr><td class="faint mono">${esc(fmtDate(a.at))}</td><td class="faint">${esc(a.actor||"")}</td>
    <td><b>${esc(a.action)}</b></td><td class="faint">${esc(a.target_type)} ${esc(a.target_id)}</td>
    <td class="faint">${esc(a.detail||"")}</td><td>${a.result==="ok"?'<span class="badge b-green">ok</span>':`<span class="badge b-red">${esc(a.result)}</span>`}</td></tr>`).join("");
  m.innerHTML=`<div class="page-h"><div><h1>Audit</h1><p>Control-plane actions for this ERP. Immutable, separate from the ERP's own audit trail.</p></div></div>
    <div class="tablewrap"><div class="scroll"><table>
      <thead><tr><th>When</th><th>Operator</th><th>Action</th><th>Target</th><th>Detail</th><th>Result</th></tr></thead>
      <tbody>${ov.audit.length?body:`<tr><td colspan="6">${emptyState("No audit entries yet","","","")}</td></tr>`}</tbody></table></div></div>`;
}

/* -------- Settings -------- */
function erpSettings(id,ov,m){
  const p=ov.product;
  m.innerHTML=`<div class="page-h"><div><h1>Settings</h1><p>Product metadata and platform posture.</p></div></div>
    <div class="grid" style="grid-template-columns:1fr 1fr">
      <div class="card" style="padding:18px"><h3 style="margin:0 0 12px;font-size:14px">Product</h3>
        <div class="field"><label>Product ID</label><input value="${esc(p.id)}" disabled/></div>
        <div class="field"><label>Name</label><input value="${esc(p.name)}" disabled/></div>
        <div class="field"><label>Description</label><input value="${esc(p.description||"")}" disabled/></div>
        <div class="field"><label>Status</label><input value="${esc(p.status)}" disabled/></div>
        <div class="hint faint">Product editing lands in a later milestone.</div>
      </div>
      <div class="card" style="padding:18px"><h3 style="margin:0 0 12px;font-size:14px">Platform posture</h3>
        <div class="note">This ERP is a <b>registered</b> product. PFS stores metadata only and never holds customer
          transactional data. The Control Center is an independent service with its own database, auth realm, CI and deploy.</div>
        <div style="margin-top:12px" class="lifecycle">${ov.environments.map(e=>`<div class="lc"><b>${esc(e.display_name||e.kind)}</b><span class="faint">${esc(e.status)}</span></div>`).join("")}</div>
      </div></div>`;
}

/* ---------------- platform-level views ---------------- */
async function renderPlatformSessions(){
  shell({crumbs:`${crumbHome()}<span class="sep">▸</span><span class="cur">Support Sessions</span>`,rail:"",body:`<div class="skel" style="height:200px"></div>`});
  let rows; try{ rows=await api("/api/support-sessions"); }catch(e){ return errMain(e); }
  const m=document.getElementById("main");
  const body=rows.map(s=>`<tr><td class="faint">${esc(s.erp_product_id)}</td><td class="co">${esc(s.customer_name||s.customer_ref_id)}</td>
    <td>${sessBadge(s.status)}</td><td class="faint">${esc(fmtDate(s.created_at))}</td><td class="faint">${esc(fmtDate(s.expires_at))}</td>
    <td class="rowact">${["active","pending_erp_integration"].includes(s.status)?`<button class="btn danger sm" onclick="revokeSessionG(${s.id})">Revoke</button>`:"—"}</td></tr>`).join("");
  m.innerHTML=`<div class="page-h"><div><h1>All Support Sessions</h1><p>Every support grant across every ERP.</p></div></div>
    <div class="tablewrap"><div class="scroll"><table><thead><tr><th>ERP</th><th>Customer</th><th>Status</th><th>Opened</th><th>Expires</th><th></th></tr></thead>
    <tbody>${rows.length?body:`<tr><td colspan="6">${emptyState("No support sessions","","","")}</td></tr>`}</tbody></table></div></div>`;
}
async function revokeSessionG(sid){ if(!await confirmDialog({title:"Revoke session?",body:`<div class="note warn">Immediately revoked and audited.</div>`,ok:"Revoke",danger:true}))return;
  try{ await api("/api/support-sessions/"+sid+"/revoke",{method:"POST"}); toast("Revoked","ok"); renderPlatformSessions(); }catch(e){ toast(e.message,"err"); } }
window.revokeSessionG=revokeSessionG;

async function renderPlatformAudit(){
  shell({crumbs:`${crumbHome()}<span class="sep">▸</span><span class="cur">Platform Audit</span>`,rail:"",body:`<div class="skel" style="height:200px"></div>`});
  let rows; try{ rows=await api("/api/audit"); }catch(e){ return errMain(e); }
  const m=document.getElementById("main");
  const body=rows.map(a=>`<tr><td class="faint mono">${esc(fmtDate(a.at))}</td><td class="faint">${esc(a.actor||"")}</td><td><b>${esc(a.action)}</b></td>
    <td class="faint">${esc(a.target_type)} ${esc(a.target_id)}</td><td class="faint">${esc(a.detail||"")}</td></tr>`).join("");
  m.innerHTML=`<div class="page-h"><div><h1>Platform Audit</h1><p>Immutable control-plane audit trail.</p></div></div>
    <div class="tablewrap"><div class="scroll"><table><thead><tr><th>When</th><th>Operator</th><th>Action</th><th>Target</th><th>Detail</th></tr></thead>
    <tbody>${rows.length?body:`<tr><td colspan="5">${emptyState("No audit entries","","","")}</td></tr>`}</tbody></table></div></div>`;
}
function renderPlatformSettings(){
  shell({crumbs:`${crumbHome()}<span class="sep">▸</span><span class="cur">Platform Settings</span>`,rail:"",body:""});
  document.getElementById("main").innerHTML=`<div class="page-h"><div><h1>Platform Settings</h1><p>PFS Control Center — the one place you run every ERP.</p></div></div>
    <div class="card" style="padding:18px;max-width:640px">
      <div class="field"><label>Operator</label><input value="${esc((S.op&&S.op.name)||"")} (${esc((S.op&&S.op.id)||"")})" disabled/></div>
      <div class="field"><label>Role</label><input value="${esc((S.op&&S.op.role)||"")}" disabled/></div>
      <div class="note">The Control Center stores platform metadata only. Each ERP is independent; customer transactional
        data always stays inside the ERP. Support sessions never use a customer's password.</div>
      <div style="margin-top:14px"><button class="btn danger" onclick="logout()">Sign out</button></div>
    </div>`;
}

/* ---------------- helpers ---------------- */
function emptyState(title,sub,btnLabel,btnAction){ return `<div class="empty"><div class="ei">▢</div><h4>${esc(title)}</h4>
  <div>${esc(sub||"")}</div>${btnLabel?`<div style="margin-top:12px"><button class="btn primary" onclick="${btnAction}">${esc(btnLabel)}</button></div>`:""}</div>`; }
function errMain(e){ const m=document.getElementById("main")||el;
  m.innerHTML=`<div class="errbox">Couldn't load: ${esc(e.message)} <button class="btn sm" style="margin-left:10px" onclick="route()">Retry</button></div>`; }

/* ---------------- boot ---------------- */
route();
</script>
</body>
</html>
