<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>PFS Control Center</title>
<style>
  :root{
    --bg:#f6f8fa; --surface:#ffffff; --surface-2:#fbfcfd; --ink:#111827; --muted:#5b6472;
    --faint:#8b94a3; --line:#e7ebf0; --line-2:#f0f3f6; --brand:#2ca01c; --brand-d:#1f7a15;
    --brand-t:#e9f6e6; --blue:#2f6fed; --blue-t:#eaf1fe; --amber:#b7791f; --amber-t:#fdf3e2;
    --red:#d64545; --red-t:#fce9e9; --violet:#7c5cff; --violet-t:#efeaff; --gray-t:#eef1f5;
    --shadow-sm:0 1px 2px rgba(16,24,40,.05); --shadow:0 2px 8px rgba(16,24,40,.06);
    --shadow-lg:0 12px 32px rgba(16,24,40,.12); --radius:12px; --radius-sm:8px;
    --topbar:56px; --sidebar:236px;
  }
  html[data-theme="dark"]{
    --bg:#0e1117; --surface:#161b22; --surface-2:#1b212b; --ink:#e6edf3; --muted:#9aa4b2;
    --faint:#6e7781; --line:#252c37; --line-2:#1e242e; --brand:#3fb950; --brand-d:#2ea043;
    --brand-t:#132b17; --blue:#4b8bff; --blue-t:#12233f; --amber:#d9a441; --amber-t:#33280f;
    --red:#f0616d; --red-t:#3a1a1d; --violet:#a892ff; --violet-t:#221a3d; --gray-t:#222834;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3); --shadow:0 2px 10px rgba(0,0,0,.35);
    --shadow-lg:0 16px 40px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;font-size:14px;cursor:pointer;color:inherit}
  svg{display:block}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  .hidden{display:none!important}
  ::-webkit-scrollbar{width:10px;height:10px} ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

  /* buttons */
  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:8px 13px;
    border-radius:var(--radius-sm);font-weight:600;display:inline-flex;align-items:center;gap:7px;
    transition:background .13s,border-color .13s,transform .06s,box-shadow .13s;white-space:nowrap}
  .btn:hover{background:var(--surface-2);border-color:#d2dae3}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
  .btn.primary:hover{background:var(--brand-d);border-color:var(--brand-d)}
  .btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
  .btn.ghost:hover{background:var(--gray-t);color:var(--ink)}
  .btn.danger{color:var(--red);border-color:transparent;background:transparent}
  .btn.danger:hover{background:var(--red-t)}
  .btn.sm{padding:5px 10px;font-size:13px}
  .btn.icon{padding:8px;border-color:transparent;background:transparent;color:var(--muted);border-radius:9px}
  .btn.icon:hover{background:var(--gray-t);color:var(--ink)}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* badges */
  .badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;
    font-size:12px;font-weight:600;background:var(--gray-t);color:var(--muted);white-space:nowrap;line-height:1.5}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
  .b-green{background:var(--brand-t);color:var(--brand-d)} .b-blue{background:var(--blue-t);color:var(--blue)}
  .b-amber{background:var(--amber-t);color:var(--amber)} .b-red{background:var(--red-t);color:var(--red)}
  .b-violet{background:var(--violet-t);color:var(--violet)} .b-gray{background:var(--gray-t);color:var(--muted)}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:50;height:var(--topbar);background:var(--surface);
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 14px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;letter-spacing:.2px;flex:none}
  .brand .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--brand),#40c256);
    color:#fff;display:grid;place-items:center;font-size:13px;font-weight:800}
  .hamburger{display:none}
  .crumbs{display:flex;align-items:center;gap:6px;color:var(--muted);font-weight:600;min-width:0;overflow:hidden;flex:none}
  .crumbs a:hover{color:var(--ink)} .crumbs .sep{color:var(--faint)} .crumbs .cur{color:var(--ink)}
  .spacer{flex:1}
  .topbar-actions{display:flex;align-items:center;gap:6px;flex:none}

  /* global search */
  .gsearch{position:relative;flex:1;max-width:520px;min-width:120px}
  .gsearch .field{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);
    border-radius:10px;padding:7px 11px;transition:border-color .13s,box-shadow .13s}
  .gsearch .field:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-t)}
  .gsearch input{border:none;background:none;outline:none;flex:1;color:var(--ink);font-size:13.5px;min-width:0}
  .gsearch .kbd{font-size:11px;color:var(--faint);border:1px solid var(--line);border-radius:5px;padding:1px 5px}
  .gs-panel{position:absolute;top:44px;left:0;right:0;background:var(--surface);border:1px solid var(--line);
    border-radius:12px;box-shadow:var(--shadow-lg);max-height:64vh;overflow:auto;z-index:60;padding:6px}
  .gs-cat{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:700;padding:9px 10px 4px}
  .gs-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer}
  .gs-item:hover,.gs-item.active{background:var(--gray-t)}
  .gs-item .ic{color:var(--muted);flex:none} .gs-item .t{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .gs-empty{padding:22px;text-align:center;color:var(--muted)}

  /* dropdown menus */
  .pop{position:relative}
  .menu{position:absolute;right:0;top:44px;background:var(--surface);border:1px solid var(--line);border-radius:12px;
    box-shadow:var(--shadow-lg);min-width:230px;padding:6px;z-index:60;animation:pop .12s ease}
  @keyframes pop{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .menu .hd{padding:9px 11px 5px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:700}
  .menu button.item{display:flex;width:100%;text-align:left;border:none;background:none;padding:9px 11px;border-radius:8px;
    align-items:center;gap:10px;color:var(--ink);font-weight:500}
  .menu button.item:hover{background:var(--gray-t)}
  .menu .sepline{height:1px;background:var(--line);margin:5px 4px}
  .bell-wrap{position:relative}
  .bell-badge{position:absolute;top:3px;right:3px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;
    background:var(--red);color:#fff;font-size:10px;font-weight:800;display:grid;place-items:center;border:2px solid var(--surface)}
  .avatar{width:28px;height:28px;border-radius:50%;background:var(--brand-t);color:var(--brand-d);
    display:grid;place-items:center;font-weight:800;font-size:12px}
  .notif{display:flex;gap:10px;padding:9px 10px;border-radius:8px}
  .notif:hover{background:var(--gray-t)} .notif .ic{color:var(--muted);flex:none;margin-top:1px}
  .notif .t{font-weight:600;font-size:13px} .notif .s{color:var(--faint);font-size:12px}

  /* layout */
  .layout{display:flex;min-height:calc(100vh - var(--topbar))}
  .sidebar{width:var(--sidebar);flex:none;background:var(--surface);border-right:1px solid var(--line);
    padding:12px 10px;display:flex;flex-direction:column;gap:2px;position:sticky;top:var(--topbar);
    height:calc(100vh - var(--topbar));overflow:auto}
  .sidebar .switch{display:flex;align-items:center;gap:9px;padding:9px 10px;border:1px solid var(--line);
    border-radius:10px;margin-bottom:8px;cursor:pointer;font-weight:700}
  .sidebar .switch:hover{background:var(--gray-t)}
  .sidebar a.nav{display:flex;align-items:center;gap:11px;padding:8px 10px;border-radius:9px;color:var(--muted);font-weight:600}
  .sidebar a.nav:hover{background:var(--gray-t);color:var(--ink)}
  .sidebar a.nav.active{background:var(--brand-t);color:var(--brand-d)}
  .sidebar a.nav .ic{flex:none} .sidebar a.nav .ct{margin-left:auto;font-size:11px;background:var(--gray-t);
    color:var(--muted);border-radius:999px;padding:0 7px;font-weight:700}
  .sidebar a.nav.active .ct{background:#d6efd0;color:var(--brand-d)}
  html[data-theme="dark"] .sidebar a.nav.active .ct{background:#18351d}
  .content{flex:1;min-width:0;padding:22px 26px 64px;max-width:1360px;margin:0 auto;width:100%}
  .scrim{display:none}

  /* page header */
  .page-h{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;flex-wrap:wrap}
  .page-h h1{font-size:22px;margin:0;font-weight:800;letter-spacing:-.3px}
  .page-h p{margin:4px 0 0;color:var(--muted)}
  .page-h .actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
  .section-h{display:flex;align-items:center;gap:10px;margin:0 0 12px}
  .section-h h2{font-size:15px;margin:0;font-weight:700} .section-h .more{margin-left:auto}

  /* cards & grids */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
  .pad{padding:16px}
  .grid{display:grid;gap:16px}
  .cols-auto{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
  .dash{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
  .col-4{grid-column:span 4} .col-6{grid-column:span 6} .col-8{grid-column:span 8} .col-12{grid-column:span 12}
  @media(max-width:1080px){.col-4,.col-6,.col-8{grid-column:span 12}}

  .erpcard{padding:18px;display:flex;flex-direction:column;gap:13px;cursor:pointer;position:relative;
    transition:border-color .14s,box-shadow .14s,transform .14s}
  .erpcard:hover{border-color:#cfe6c8;box-shadow:var(--shadow-lg);transform:translateY(-2px)}
  .erpcard:focus-visible{outline:2px solid var(--brand);outline-offset:2px;border-color:#cfe6c8}
  .erpcard:hover .go{opacity:1;transform:none}
  .erpcard .go{position:absolute;top:16px;right:16px;color:var(--brand-d);opacity:0;transform:translateX(-4px);transition:.14s}
  .erpcard .top{display:flex;align-items:center;gap:12px}
  .erpcard .icon{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,#eaf6e6,#dcefd5);
    color:var(--brand-d);display:grid;place-items:center;font-weight:800;font-size:16px;flex:none}
  html[data-theme="dark"] .erpcard .icon{background:linear-gradient(135deg,#14301a,#102615)}
  .erpcard h3{margin:0;font-size:16px;font-weight:800}
  .erpcard .desc{color:var(--muted);font-size:13px;min-height:19px}
  .statrow{display:flex;gap:20px;flex-wrap:wrap;border-top:1px solid var(--line-2);padding-top:13px}
  .stat b{display:block;font-size:17px;font-weight:800} .stat span{font-size:11px;color:var(--faint);
    text-transform:uppercase;letter-spacing:.4px;font-weight:700}

  /* stat tiles */
  .tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
  .tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;
    box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:6px}
  .tile .lab{display:flex;align-items:center;gap:8px;color:var(--faint);font-size:12px;text-transform:uppercase;
    letter-spacing:.4px;font-weight:700}
  .tile b{font-size:24px;font-weight:800;letter-spacing:-.4px}

  /* list rows (widgets) */
  .lrow{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid var(--line-2)}
  .lrow:last-child{border-bottom:none}
  .lrow .ic{color:var(--muted);flex:none} .lrow .m{flex:1;min-width:0}
  .lrow .m .t{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lrow .m .s{color:var(--faint);font-size:12px}
  .lrow a.t:hover{color:var(--brand-d)}

  /* tables */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .search{position:relative;flex:1;min-width:180px;max-width:340px}
  .search input,.field-in{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;
    background:var(--surface);color:var(--ink);transition:border-color .13s,box-shadow .13s}
  .search input{padding-left:33px}
  .search input:focus,.field-in:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-t)}
  .search .mag{position:absolute;left:10px;top:9px;color:var(--faint)}
  select.filter{padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--surface);font-weight:600;color:var(--ink)}
  .tablewrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
  .scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  thead th{text-align:left;padding:11px 14px;background:var(--surface-2);border-bottom:1px solid var(--line);
    font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700;white-space:nowrap;user-select:none}
  thead th.sortable{cursor:pointer} thead th.sortable:hover{color:var(--ink)}
  thead th .sortarrow{opacity:.5;margin-left:4px}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line-2);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none} tbody tr:hover{background:var(--surface-2)}
  tbody tr.sel{background:var(--brand-t)}
  td .co{font-weight:700} td a.co:hover{color:var(--brand-d)} td .ref{font-size:12px;color:var(--faint)}
  .rowact{display:flex;gap:6px;justify-content:flex-end}
  .pager{display:flex;align-items:center;gap:10px;justify-content:flex-end;padding:11px 14px;border-top:1px solid var(--line-2);color:var(--muted);flex-wrap:wrap}
  .bulkbar{display:flex;align-items:center;gap:12px;padding:9px 14px;background:var(--brand-t);border-bottom:1px solid var(--line);
    color:var(--brand-d);font-weight:600}
  input[type=checkbox]{accent-color:var(--brand);width:15px;height:15px}

  /* states */
  .empty{padding:44px 20px;text-align:center;color:var(--muted)}
  .empty .ei{color:var(--faint);margin-bottom:10px;display:flex;justify-content:center}
  .empty h4{margin:0 0 4px;color:var(--ink);font-size:15px}
  .skel{background:linear-gradient(90deg,var(--line-2) 25%,var(--line) 37%,var(--line-2) 63%);
    background-size:400% 100%;animation:sh 1.3s infinite;border-radius:8px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}
  .errbox{background:var(--red-t);border:1px solid var(--red);color:var(--red);padding:14px 16px;border-radius:10px;font-weight:600}

  /* modal / wizard */
  .overlay{position:fixed;inset:0;background:rgba(15,22,32,.5);display:grid;place-items:center;z-index:80;padding:18px;
    animation:fade .12s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:var(--surface);border-radius:16px;box-shadow:var(--shadow-lg);width:100%;max-width:560px;
    max-height:92vh;overflow:auto;animation:pop .14s ease}
  .modal .mh{padding:18px 22px 8px} .modal .mh h3{margin:0;font-size:17px;font-weight:800}
  .modal .mh p{margin:4px 0 0;color:var(--muted);font-size:13px}
  .modal .mb{padding:6px 22px} .modal .mf{padding:16px 22px 20px;display:flex;gap:9px;justify-content:flex-end;
    border-top:1px solid var(--line-2);margin-top:14px;flex-wrap:wrap}
  .field{margin:13px 0} .field label{display:block;font-weight:700;font-size:12.5px;margin-bottom:6px;color:var(--muted)}
  .field textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px;
    background:var(--surface);color:var(--ink);font-family:inherit;resize:vertical}
  .field .hint{font-weight:500;color:var(--faint);font-size:12px;margin-top:5px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .note{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--muted);font-size:13px}
  .note.warn{background:var(--amber-t);border-color:var(--amber);color:var(--amber)}
  .steps{display:flex;gap:6px;padding:14px 22px 0}
  .step{flex:1;height:4px;border-radius:3px;background:var(--line)} .step.on{background:var(--brand)}
  .steplabels{display:flex;gap:6px;padding:8px 22px 0;font-size:12px;color:var(--faint);font-weight:600;flex-wrap:wrap}

  /* toast */
  #toasts{position:fixed;right:18px;bottom:18px;z-index:100;display:flex;flex-direction:column;gap:9px}
  .toast{background:#11202c;color:#fff;padding:11px 15px;border-radius:10px;box-shadow:var(--shadow-lg);
    font-weight:600;display:flex;gap:9px;align-items:center;animation:tin .18s ease;max-width:360px}
  .toast.ok{background:var(--brand-d)} .toast.err{background:var(--red)}
  @keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* login */
  .login{min-height:100vh;display:grid;place-items:center;padding:20px;
    background:radial-gradient(1200px 520px at 50% -12%,var(--brand-t),transparent),var(--bg)}
  .login .box{width:100%;max-width:390px}
  .login .card{padding:28px} .login .brand{justify-content:center;font-size:20px;margin-bottom:6px}
  .login h2{margin:16px 0 2px;font-size:19px;text-align:center} .login p.sub{margin:0 0 18px;text-align:center;color:var(--muted)}

  .lifecycle{display:flex;gap:8px;flex-wrap:wrap}
  .lc{border:1px solid var(--line);border-radius:9px;padding:8px 12px;background:var(--surface-2);font-weight:600;color:var(--muted)}
  .lc b{display:block;color:var(--ink);font-size:12px}
  .hbar{height:8px;border-radius:6px;background:var(--gray-t);overflow:hidden;display:flex}
  .hbar span{height:100%}

  /* responsive */
  @media(max-width:900px){
    .hamburger{display:inline-flex}
    .sidebar{position:fixed;left:0;top:var(--topbar);z-index:70;height:calc(100vh - var(--topbar));
      transform:translateX(-105%);transition:transform .2s;box-shadow:var(--shadow-lg)}
    .sidebar.open{transform:none}
    .scrim.show{display:block;position:fixed;inset:var(--topbar) 0 0 0;background:rgba(0,0,0,.35);z-index:65}
    .content{padding:16px 14px 56px}
    .gsearch .kbd{display:none}
    .crumbs .hideS{display:none}
  }
  @media(max-width:560px){
    .gsearch{max-width:none}
    .brand span{display:none}
    .page-h h1{font-size:19px}
  }
</style>
</head>
<body>
<div id="app"><div class="login"><div class="box"><div class="card login"><div class="brand"><div class="logo">PFS</div></div><p class="sub">Loading…</p></div></div></div></div>
<div id="modalRoot"></div>
<div id="toasts"></div>

<script>
"use strict";
/* ============================ icons ============================ */
const ICONS={
 search:'<path d="M21 21l-4.3-4.3M11 19a8 8 0 110-16 8 8 0 010 16z"/>',
 bell:'<path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 01-3.4 0"/>',
 grid:'<path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/>',
 users:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8M23 21v-2a4 4 0 00-3-3.9M16 3.1a4 4 0 010 7.8"/>',
 shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
 tag:'<path d="M20.6 13.4L12 22l-9-9V3h10l7.6 7.6a2 2 0 010 2.8zM7 7h.01"/>',
 upload:'<path d="M4 17v3a1 1 0 001 1h14a1 1 0 001-1v-3M12 3v13M7 8l5-5 5 5"/>',

function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function fmtDate(s){if(!s)return "—";const d=new Date(s);return isNaN(d)?"—":d.toLocaleString(undefined,{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}
function fmtDay(s){if(!s)return "—";const d=new Date(s);return isNaN(d)?"—":d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});}
function timeAgo(s){if(!s)return "—";const d=new Date(s),m=Math.floor((Date.now()-d)/60000);
  if(m<1)return "just now";if(m<60)return m+"m ago";const h=Math.floor(m/60);if(h<24)return h+"h ago";return Math.floor(h/24)+"d ago";}
function debounce(fn,ms){let t;return function(){clearTimeout(t);const a=arguments,c=this;t=setTimeout(()=>fn.apply(c,a),ms);};}

async function api(path,opts={}){
  const h=Object.assign({},opts.headers||{});
  if(S.token)h["Authorization"]="Bearer "+S.token;
  if(opts.json!==undefined){h["Content-Type"]="application/json";opts.body=JSON.stringify(opts.json);}
  const r=await fetch(path,{method:opts.method||"GET",headers:h,body:opts.body});
  if(r.status===401){logout();throw new Error("Session expired — please sign in again.");}
  let d=null;try{d=await r.json();}catch(e){}
  if(!r.ok){const m=(d&&(d.detail||d.message))||("HTTP "+r.status);throw new Error(typeof m==="string"?m:JSON.stringify(m));}
  return d;
}
async function login(u,p){const b=new URLSearchParams({username:u,password:p});
  const r=await fetch("/auth/login",{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:b});
  if(!r.ok)throw new Error("Invalid credentials");const d=await r.json();S.token=d.access_token;localStorage.setItem("cc_token",S.token);}

function parseHash(){const h=(location.hash||"#/").replace(/^#/,""),p=h.split("/").filter(Boolean);
  if(p[0]==="erp"&&p[1])return {view:"erp",id:decodeURIComponent(p[1]),tab:p[2]||"overview"};
  if(["sessions","audit","settings","profile","apikeys","preferences"].includes(p[0]))return {view:p[0]};
  return {view:"home"};}
async function route(){
  if(!S.token){renderLogin();return;}
  if(!S.op){try{const h=await api("/api/home");S.op=h.operator;window.__home=h;h.products.forEach(p=>S.erpName[p.id]=p.name);}catch(e){renderLogin();return;}}
  const r=parseHash();closeMenus();
  if(r.view==="home")return renderDashboard();
  if(r.view==="sessions")return renderPlatformSessions();
  if(r.view==="audit")return renderPlatformAudit();
  if(r.view==="settings")return renderPlatformSettings();
  if(r.view==="profile")return renderProfile();
  if(r.view==="preferences")return renderPreferences();
  if(r.view==="apikeys")return renderApiKeys();
  if(r.view==="erp")return renderErp(r.id,r.tab);
}
window.addEventListener("hashchange",route);

function notifClassify(a){
  if((a.result&&a.result!=="ok")||a.action==="health_check")return {kind:"System alert",icon:"heart"};
  if(a.target_type==="release")return {kind:"Version alert",icon:"tag"};
  if(a.target_type==="customer_ref"||a.target_type==="customer_deployment")return {kind:"Customer alert",icon:"users"};
  if(a.target_type==="support_session")return {kind:"Support session",icon:"shield"};
  if(a.target_type==="license")return {kind:"License",icon:"key"};
  return {kind:"Platform event",icon:"activity"};
}
function notifList(){return ((window.__dash&&window.__dash.recent_activity)||[]).slice(0,12);}
function notifUnread(){const seen=localStorage.getItem("cc_notif_seen")||"";return notifList().filter(a=>a.at&&a.at>seen).length;}
function notifMarkSeen(){const l=notifList();if(l.length)localStorage.setItem("cc_notif_seen",l[0].at||new Date().toISOString());

  const seen=localStorage.getItem("cc_notif_seen")||"", items=notifList(), unread=items.filter(a=>a.at&&a.at>seen).length;
  menu.innerHTML=`<div class="hd">Notifications${unread?` · <span style="color:var(--brand-d)">${unread} new</span>`:""}</div>`+

const PAGE_DEFAULT=25;
function erpCustomers(id,ov,m){
  let rows=ov.customers.slice();
  const st={q:"",status:"",sort:"name",dir:1,page:1,size:PAGE_DEFAULT,sel:new Set()};
  const sortKeys={name:r=>(r.name||"").toLowerCase(),license:r=>r.license_status||"",version:r=>r.current_version||"",status:r=>r.status||"",health:r=>r.health||"",sync:r=>r.last_sync_state||""};
  window.__custOpen=(cid)=>{const r=rows.find(x=>x.id===cid);if(r)openErpModal(id,r);};
  window.__custDetail=(cid)=>{const r=rows.find(x=>x.id===cid);if(r)customerDetail(id,r);};
  const draw=()=>{
    let f=rows.filter(r=>(!st.q||(r.name||"").toLowerCase().includes(st.q)||(r.external_ref||"").toLowerCase().includes(st.q))&&(!st.status||r.status===st.status));
    const key=sortKeys[st.sort]||sortKeys.name;f.sort((a,b)=>{const x=key(a),y=key(b);return x<y?-st.dir:x>y?st.dir:0;});
    const total=f.length,pages=Math.max(1,Math.ceil(total/st.size));if(st.page>pages)st.page=pages;
    const slice=f.slice((st.page-1)*st.size,st.page*st.size);
    document.getElementById("cbody").innerHTML=total?slice.map(r=>`<tr class="${st.sel.has(r.id)?"sel":""}">
      <td><input type="checkbox" ${st.sel.has(r.id)?"checked":""} onclick="__csel(${r.id})"></td>
      <td><a class="co" style="cursor:pointer" onclick="__custDetail(${r.id})">${esc(r.name)}</a><div class="ref mono">ref: ${esc(r.external_ref||"—")}</div></td>
      <td>${licBadge(r.license_status)}<div class="faint" style="font-size:12px">${esc(r.license_plan||"—")}</div></td>
      <td>${esc(r.current_version||"—")}</td><td>${custBadge(r.status)}</td>
      <td>${healthBadge(r.health)}<div class="faint" style="font-size:11px">inherited</div></td>
      <td class="faint">${r.last_sync_state==="not_yet_integrated"?'<span class="badge b-gray">Not integrated</span>':esc(fmtDate(r.last_sync_at))}</td>
      <td class="faint" style="font-size:12px">${r.deployment_type==="customer_production_shared"?"Shared prod":esc(r.deployment_type||"—")}</td>
      <td class="rowact"><button class="btn sm" onclick="__custDetail(${r.id})">Details</button><button class="btn primary sm" onclick="__custOpen(${r.id})">${ic("shield",14)} Open ERP</button></td></tr>`).join(""):
      `<tr><td colspan="9">${emptyState("No customers match","Adjust search or filters.","","","users")}</td></tr>`;
    document.getElementById("pager").innerHTML=`<span class="faint" style="margin-right:auto">${total} customer${total===1?"":"s"}</span>
      <select class="filter" onchange="__csize(this.value)">${[10,25,50,100].map(n=>`<option ${st.size===n?"selected":""}>${n}</option>`).join("")}</select>
      <span class="faint">${total?((st.page-1)*st.size+1)+"–"+Math.min(st.page*st.size,total):0} of ${total}</span>
      <button class="btn sm" ${st.page<=1?"disabled":""} onclick="__cpage(${st.page-1})">Prev</button>
      <button class="btn sm" ${st.page>=pages?"disabled":""} onclick="__cpage(${st.page+1})">Next</button>`;
    const bar=document.getElementById("bulkbar");
    if(st.sel.size){bar.classList.remove("hidden");document.getElementById("bulkn").textContent=st.sel.size;}else bar.classList.add("hidden");
    document.getElementById("selall").checked=slice.length&&slice.every(r=>st.sel.has(r.id));
    document.querySelectorAll("th.sortable").forEach(th=>{const k=th.dataset.k;th.querySelector(".sortarrow").textContent=st.sort===k?(st.dir===1?"↑":"↓"):"";});
  };
  window.__csel=(cid)=>{st.sel.has(cid)?st.sel.delete(cid):st.sel.add(cid);draw();};
  window.__cpage=(p)=>{st.page=p;draw();};window.__csize=(n)=>{st.size=+n;st.page=1;draw();};
  window.__csort=(k)=>{if(st.sort===k)st.dir*=-1;else{st.sort=k;st.dir=1;}draw();};
  window.__cselall=()=>{const f=rows.filter(r=>(!st.q||(r.name||"").toLowerCase().includes(st.q))&&(!st.status||r.status===st.status)).slice((st.page-1)*st.size,st.page*st.size);
    const all=f.every(r=>st.sel.has(r.id));f.forEach(r=>all?st.sel.delete(r.id):st.sel.add(r.id));draw();};
  window.__cexport=()=>{const chosen=rows.filter(r=>st.sel.has(r.id));
    const cols=["name","external_ref","license_plan","license_status","current_version","status","health","deployment_type"];
    const csv=[cols.join(",")].concat(chosen.map(r=>cols.map(c=>`"${String(r[c]==null?"":r[c]).replace(/"/g,'""')}"`).join(","))).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download=id+"-customers.csv";a.click();toast("Exported "+chosen.length+" customers","ok");};
  window.__cclear=()=>{st.sel.clear();draw();};
  const th=(k,label)=>`<th class="sortable" data-k="${k}" onclick="__csort('${k}')">${label}<span class="sortarrow"></span></th>`;
  m.innerHTML=`<div class="page-h"><div><h1>Customers</h1><p>The heart of this ERP — every company running ${esc(S.erpName[id]||id)}.</p></div>
     <div class="actions"><button class="btn" onclick="newCustomerModal('${id}')">${ic("plus",15)} Add customer</button></div></div>
   <div class="toolbar">
     <div class="search">${'<span class="mag">'+ic("search",15)+'</span>'}<input id="csearch" placeholder="Search company or reference…"/></div>
     <select class="filter" id="cstatus"><option value="">All statuses</option><option>active</option><option>suspended</option><option>inactive</option></select>
   </div>
   <div class="tablewrap">
     <div id="bulkbar" class="bulkbar hidden">${ic("check",15)} <span><b id="bulkn">0</b> selected</span>
       <button class="btn sm" onclick="__cexport()">Export CSV</button><button class="btn ghost sm" onclick="__cclear()">Clear</button></div>
     <div class="scroll"><table>
       <thead><tr><th style="width:34px"><input type="checkbox" id="selall" onclick="__cselall()"></th>
         ${th("name","Company")}${th("license","License")}${th("version","Current Version")}${th("status","Status")}${th("health","Health")}${th("sync","Last Sync")}<th>Deployment</th><th></th></tr></thead>
       <tbody id="cbody"></tbody></table></div><div class="pager" id="pager"></div></div>`;
  document.getElementById("csearch").addEventListener("input",debounce(e=>{st.q=e.target.value.trim().toLowerCase();st.page=1;draw();},120));
  document.getElementById("cstatus").addEventListener("change",e=>{st.status=e.target.value;st.page=1;draw();});
  draw();
}

/* ============================ Register ERP wizard ============================ */
function registerErpWizard(){
  const state={step:0,d:{id:"",name:"",description:"",repo:"",branch:"main",deploy_url:"",health_url:"",tags:""}};
  const steps=["General Information","Repository","Deployment","Metadata","Confirmation"];
  const render=()=>{
    const d=state.d;
    let body="";
    if(state.step===0)body=`<div class="note">${ic("box",14)} ERP systems are <b>built externally</b> and then registered into PFS. This records product metadata only.</div>
      <div class="field"><label>Product ID *</label><input class="field-in" id="w_id" value="${esc(d.id)}" placeholder="e.g. dairy"/><div class="hint">Lowercase, stable identifier.</div></div>
      <div class="field"><label>Display name *</label><input class="field-in" id="w_name" value="${esc(d.name)}" placeholder="e.g. Dairy ERP"/></div>`;
    else if(state.step===1)body=`<div class="field"><label>Repository URL</label><input class="field-in" id="w_repo" value="${esc(d.repo)}" placeholder="https://github.com/org/repo"/></div>
      <div class="field"><label>Default branch</label><input class="field-in" id="w_branch" value="${esc(d.branch)}"/></div>`;
    else if(state.step===2)body=`<div class="field"><label>Customer production URL</label><input class="field-in" id="w_deploy" value="${esc(d.deploy_url)}" placeholder="https://app.example.com"/></div>
      <div class="field"><label>Health endpoint</label><input class="field-in" id="w_health" value="${esc(d.health_url)}" placeholder="https://app.example.com/api/health"/></div>`;
    else if(state.step===3)body=`<div class="field"><label>Description</label><textarea id="w_desc" rows="3" placeholder="What this ERP does">${esc(d.description)}</textarea></div>
      <div class="field"><label>Tags</label><input class="field-in" id="w_tags" value="${esc(d.tags)}" placeholder="inventory, invoicing"/></div>`;
    else body=`<div class="note">${ic("check",14)} Review before registering.</div>
      <div class="lrow"><div class="m"><div class="t">${esc(d.name||"—")}</div><div class="s mono">${esc(d.id||"—")}</div></div>${ic("box",18)}</div>
      <div class="lrow"><div class="m"><div class="t faint">Repository</div><div class="s">${esc(d.repo||"—")} · ${esc(d.branch)}</div></div></div>
      <div class="lrow"><div class="m"><div class="t faint">Deployment</div><div class="s">${esc(d.deploy_url||"—")}</div></div></div>
      <div class="lrow"><div class="m"><div class="t faint">Description</div><div class="s">${esc(d.description||"—")}</div></div></div>`;
    modal(`<div class="modal"><div class="steps">${steps.map((_,i)=>`<div class="step ${i<=state.step?"on":""}"></div>`).join("")}</div>
      <div class="steplabels"><span style="flex:1">Step ${state.step+1} of 5 · ${steps[state.step]}</span></div>
      <div class="mh"><h3>Register ERP · ${esc(steps[state.step])}</h3></div><div class="mb">${body}</div>
      <div class="mf"><button class="btn" onclick="closeModal()">Cancel</button>
        ${state.step>0?`<button class="btn" id="w_back">Back</button>`:""}
        <button class="btn primary" id="w_next">${state.step===4?"Register ERP":"Continue"}</button></div></div>`);
    const grab=()=>{const g=id=>{const e=document.getElementById(id);return e?e.value.trim():undefined;};
      if(state.step===0){d.id=g("w_id")??d.id;d.name=g("w_name")??d.name;}
      if(state.step===1){d.repo=g("w_repo")??d.repo;d.branch=g("w_branch")||d.branch;}
      if(state.step===2){d.deploy_url=g("w_deploy")??d.deploy_url;d.health_url=g("w_health")??d.health_url;}
      if(state.step===3){d.description=g("w_desc")??d.description;d.tags=g("w_tags")??d.tags;}};
    const back=document.getElementById("w_back");if(back)back.onclick=()=>{grab();state.step--;render();};
    document.getElementById("w_next").onclick=async()=>{grab();
      if(state.step===0&&(!d.id||!d.name)){toast("Product ID and name are required","err");return;}
      if(state.step<4){state.step++;render();return;}
      const desc=[d.description,d.repo?("Repo: "+d.repo+" ("+d.branch+")"):"",d.deploy_url?("URL: "+d.deploy_url):"",d.tags?("Tags: "+d.tags):""].filter(Boolean).join(" · ");
      const b=document.getElementById("w_next");b.disabled=true;b.textContent="Registering…";
      try{await api("/api/products",{method:"POST",json:{id:d.id,name:d.name,description:desc}});
        window.__dash=null;window.__home=null;closeModal();toast("ERP registered","ok");location.hash="#/erp/"+encodeURIComponent(d.id)+"/overview";route();
      }catch(e){toast(e.message,"err");b.disabled=false;b.textContent="Register ERP";}};
  };
  render();
}

     <div class="field"><label>Role</label><input class="field-in" value="${esc((S.op&&S.op.role)||"")}" disabled/></div></div>
   <div class="col-6 card pad"><div class="section-h"><h2>Appearance</h2></div>
     <div class="field"><label>Theme</label><div style="display:flex;gap:8px"><button class="btn ${S.theme==="light"?"primary":""}" onclick="setTheme('light');route()">${ic("sun",15)} Light</button><button class="btn ${S.theme==="dark"?"primary":""}" onclick="setTheme('dark');route()">${ic("moon",15)} Dark</button></div></div>
     <div class="note" style="margin-top:12px">The Control Center stores platform metadata only. Support sessions never use a customer's password.</div>
     <div style="margin-top:14px"><button class="btn danger" onclick="logout()">${ic("logout",15)} Sign out</button></div></div></div>`);}
function renderProfile(){pageShell("Profile","Profile",`<div class="page-h"><div><h1>Profile</h1><p>Your platform operator identity.</p></div></div>
   <div class="card pad" style="max-width:560px"><div class="lrow"><span class="avatar" style="width:44px;height:44px;font-size:16px">${opInitials()}</span>
     <div class="m"><div class="t" style="font-size:16px">${esc((S.op&&S.op.name)||"")}</div><div class="s">${esc((S.op&&S.op.id)||"")} · ${esc((S.op&&S.op.role)||"")}</div></div></div>
     <div class="note" style="margin-top:14px">Operator profile editing lands in a later milestone.</div></div>`);}
function renderApiKeys(){pageShell("API Keys","API Keys",`<div class="page-h"><div><h1>API Keys</h1><p>Programmatic access to the Control Center.</p></div></div>
   <div class="card pad">${emptyState("No API keys yet","Machine-to-machine keys will be managed here.","","","key")}</div>`);}
function renderPreferences(){
  const density=localStorage.getItem("cc_density")||"comfortable";
  pageShell("Preferences","Preferences",`<div class="page-h"><div><h1>Preferences</h1><p>Personalize your Control Center.</p></div></div>
   <div class="dash">
     <div class="col-6 card pad"><div class="section-h"><h2>Appearance</h2></div>
       <div class="field"><label>Theme</label><div style="display:flex;gap:8px">
         <button class="btn ${S.theme==="light"?"primary":""}" onclick="setTheme('light');route()">${ic("sun",15)} Light</button>
         <button class="btn ${S.theme==="dark"?"primary":""}" onclick="setTheme('dark');route()">${ic("moon",15)} Dark</button></div></div>
       <div class="field"><label>Table density</label><div style="display:flex;gap:8px">
         <button class="btn ${density==="comfortable"?"primary":""}" onclick="localStorage.setItem('cc_density','comfortable');route();toast('Comfortable density','ok')">Comfortable</button>
         <button class="btn ${density==="compact"?"primary":""}" onclick="localStorage.setItem('cc_density','compact');route();toast('Compact density','ok')">Compact</button></div></div>
     </div>
     <div class="col-6 card pad"><div class="section-h"><h2>Notifications</h2></div>
       <div class="note">The notification center groups <b>System</b>, <b>Customer</b> and <b>Version</b> alerts from the platform audit trail. Opening it marks alerts as read.</div>
       <div style="margin-top:12px"><button class="btn" onclick="localStorage.removeItem('cc_notif_seen');route();toast('Marked all as unread','ok')">${ic("bell",15)} Reset unread state</button></div>
       <div class="section-h" style="margin-top:20px"><h2>Session</h2></div>
       <div><button class="btn danger" onclick="logout()">${ic("logout",15)} Sign out</button></div>
     </div></div>`);
}
window.renderPreferences=renderPreferences;
window.setTheme=setTheme;window.logout=logout;window.route=route;window.closeModal=closeModal;window.closeMenus=closeMenus;

/* ============================ boot ============================ */
route();
</script>
</body>
</html>
