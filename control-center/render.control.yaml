# Render Blueprint — PFS Control Center (the Control Plane).
# A SEPARATE service with its OWN database, auth realm and deployment (ADR-021).
# It stores only fleet/platform METADATA — never customer ERP data.
# Provision from the Render dashboard: New → Blueprint → point at this file.
# autoDeploy is OFF so the Control Center never deploys implicitly on unrelated pushes.
databases:
  - name: pfs-control-center-db          # its OWN isolated database (metadata only)
    plan: basic-256mb
    postgresMajorVersion: "16"

services:
  - type: web
    name: pfs-control-center
    runtime: python
    plan: starter
    rootDir: control-center
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head       # schema via Alembic (never create_all in prod)
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DATABASE_URL
        fromDatabase:
          name: pfs-control-center-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true                      # its OWN realm secret (never an ERP's)
      - key: JWT_EXPIRE_MINUTES
        value: "720"
      - key: SEED_ON_START
        value: "true"                            # seed owner + register the existing fleet
      - key: SEED_PASSWORD
        sync: false                              # set the Platform Owner password in the dashboard
